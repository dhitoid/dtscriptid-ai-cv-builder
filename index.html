<style>

/* =========================
RESET
========================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

:root{
--bg:#040816;
--card:rgba(255,255,255,.06);
--border:rgba(255,255,255,.08);

--primary:#7c3aed;
--secondary:#06b6d4;
--pink:#ec4899;

--text:#fff;
--muted:rgba(255,255,255,.65);
}

html{
scroll-behavior:smooth;
}

body{
font-family:'Inter',sans-serif;
background:var(--bg);
color:white;
overflow-x:hidden;
}

/* =========================
AURORA BG
========================= */

body::before{
content:'';
position:fixed;
inset:0;
z-index:-2;

background:
radial-gradient(circle at top left,#7c3aed55,transparent 30%),
radial-gradient(circle at bottom right,#06b6d455,transparent 30%),
radial-gradient(circle at center,#ec489955,transparent 35%);

animation:aurora 16s linear infinite;
}

@keyframes aurora{
0%{
transform:rotate(0deg) scale(1);
}

50%{
transform:rotate(180deg) scale(1.15);
}

100%{
transform:rotate(360deg) scale(1);
}
}

/* =========================
NOISE
========================= */

body::after{
content:'';
position:fixed;
inset:0;
z-index:-1;
opacity:.06;
background-image:url('https://grainy-gradients.vercel.app/noise.svg');
}

/* =========================
TOPBAR
========================= */

.topbar{
position:sticky;
top:0;
z-index:999;

display:flex;
justify-content:space-between;
align-items:center;

padding:18px 24px;

backdrop-filter:blur(20px);
background:rgba(4,8,22,.72);

border-bottom:1px solid rgba(255,255,255,.08);
}

.logo-wrap{
display:flex;
align-items:center;
gap:14px;
}

.logo{
font-size:28px;
font-weight:900;

background:
linear-gradient(
135deg,
#fff,
#8be9fd
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.live-badge{
padding:10px 14px;
border-radius:999px;

font-size:11px;
font-weight:800;

background:
linear-gradient(
135deg,
#7c3aed,
#06b6d4
);
}

.top-actions{
display:flex;
gap:12px;
}

.top-btn{
border:none;
cursor:pointer;

padding:12px 16px;

border-radius:16px;

background:rgba(255,255,255,.08);

border:1px solid rgba(255,255,255,.08);

color:white;
font-weight:700;

transition:.3s;
}

.top-btn:hover{
transform:translateY(-3px);
background:rgba(255,255,255,.12);
}

/* =========================
LAYOUT
========================= */

.container{
display:grid;
grid-template-columns:420px 1fr;
min-height:100vh;
}

/* =========================
SIDEBAR
========================= */

.sidebar{
padding:24px;

border-right:1px solid rgba(255,255,255,.08);

background:rgba(255,255,255,.03);

backdrop-filter:blur(30px);

overflow-y:auto;
}

.sidebar::-webkit-scrollbar{
width:0;
}

.card{
background:rgba(255,255,255,.06);

border:1px solid rgba(255,255,255,.08);

border-radius:30px;

padding:22px;

margin-bottom:20px;

backdrop-filter:blur(20px);

box-shadow:
0 10px 40px rgba(0,0,0,.12);
}

.card h3{
font-size:16px;
margin-bottom:18px;
}

/* =========================
INPUT
========================= */

.input-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
}

.input-group{
margin-bottom:14px;
}

label{
display:block;
font-size:13px;
margin-bottom:8px;
color:var(--muted);
}

input,
textarea{
width:100%;

border:none;
outline:none;

padding:16px;

border-radius:18px;

background:rgba(255,255,255,.06);

color:white;

font-size:15px;

font-family:inherit;

border:1px solid transparent;

transition:.3s;
}

textarea{
min-height:100px;
resize:none;
}

input:focus,
textarea:focus{
border-color:#06b6d4;
background:rgba(255,255,255,.09);

box-shadow:
0 0 0 4px rgba(6,182,212,.08);
}

input::placeholder,
textarea::placeholder{
color:rgba(255,255,255,.45);
}

/* =========================
BUTTON
========================= */

button{
font-family:inherit;
}

.primary{
width:100%;

padding:16px;

border:none;

border-radius:18px;

font-weight:800;

color:white;

cursor:pointer;

background:
linear-gradient(
135deg,
#7c3aed,
#06b6d4
);

box-shadow:
0 14px 40px rgba(124,58,237,.32);

transition:.35s;
}

.primary:hover{
transform:
translateY(-5px)
scale(1.01);
}

/* =========================
UPLOAD
========================= */

.upload{
display:block;

padding:28px;

text-align:center;

border-radius:24px;

cursor:pointer;

border:2px dashed rgba(255,255,255,.12);

transition:.3s;

background:rgba(255,255,255,.02);
}

.upload:hover{
border-color:#06b6d4;
background:rgba(255,255,255,.04);
}

/* =========================
ATS SCORE
========================= */

.ats-wrap{
display:flex;
align-items:center;
justify-content:space-between;
gap:20px;
}

.ats-score{
font-size:54px;
font-weight:900;

background:
linear-gradient(
135deg,
#06b6d4,
#7c3aed
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.ats-text{
font-size:13px;
color:var(--muted);
line-height:1.6;
}

/* =========================
TEMPLATE
========================= */

.template-marketplace{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(210px,1fr));
gap:20px;
}

.template-card{
position:relative;
overflow:hidden;

border-radius:30px;

cursor:pointer;

background:
linear-gradient(
180deg,
rgba(255,255,255,.08),
rgba(255,255,255,.03)
);

border:1px solid rgba(255,255,255,.08);

transition:.45s;

backdrop-filter:blur(30px);
}

.template-card:hover{
transform:
translateY(-10px)
scale(1.02);

border-color:#8b5cf6;

box-shadow:
0 24px 60px rgba(124,58,237,.28);
}

.template-card.active{
border:2px solid #06b6d4;
}

.template-thumb{
height:240px;
background:white;
overflow:hidden;
position:relative;
}

.template-info{
padding:14px;
}

.template-name{
font-size:15px;
font-weight:800;
margin-bottom:6px;
}

.template-meta{
display:flex;
gap:10px;
flex-wrap:wrap;
font-size:12px;
opacity:.7;
}

.badge{
position:absolute;
top:12px;
left:12px;

padding:8px 12px;

border-radius:999px;

font-size:11px;
font-weight:800;

z-index:5;

background:
linear-gradient(
135deg,
#7c3aed,
#ec4899
);
}

/* =========================
PREVIEW
========================= */

.preview{
padding:40px;

display:flex;
flex-direction:column;
align-items:center;

overflow:auto;
width:100%;

gap:20px;
}

.cv{
width:210mm;
min-height:297mm;

background:white;
color:#111827;

border-radius:34px;

overflow:hidden;

box-shadow:
0 30px 70px rgba(0,0,0,.45);

transform-origin:top center;

transition:.3s;

flex-shrink:0;
}

/* =========================
ZOOM
========================= */

.zoom-controls{
display:flex;
gap:12px;
}

.zoom-controls button{
width:52px;
height:52px;

border:none;

border-radius:18px;

background:rgba(255,255,255,.08);

color:white;

font-size:18px;
font-weight:900;

cursor:pointer;
}

/* =========================
CV TEMPLATE
========================= */

.avatar{
width:120px;
height:120px;

border-radius:30px;

object-fit:cover;

margin-bottom:24px;

background:#ddd;

border:4px solid rgba(255,255,255,.18);
}

.cv-name{
font-size:42px;
font-weight:900;
line-height:1;
margin-bottom:10px;
}

.cv-role{
font-size:18px;
opacity:.85;
margin-bottom:34px;
}

.cv-section{
margin-bottom:34px;
}

.cv-title{
font-size:13px;
font-weight:800;

letter-spacing:2px;

margin-bottom:14px;

opacity:.7;
}

.cv-card{
background:rgba(255,255,255,.1);

padding:16px;

border-radius:18px;

margin-bottom:12px;

word-break:break-word;
}

.section{
margin-bottom:34px;
page-break-inside:avoid;
break-inside:avoid;
}

.section-title{
font-size:22px;
font-weight:900;
margin-bottom:16px;
}

.section p{
line-height:1.8;
white-space:pre-line;
}

.skills{
display:flex;
flex-wrap:wrap;
gap:10px;
}

.tag{
padding:10px 14px;

border-radius:999px;

background:white;

color:#111827;

font-size:12px;
font-weight:700;
}

/* =========================
MODERN
========================= */

.modern-layout{
display:grid;
grid-template-columns:320px 1fr;
min-height:297mm;
}

.modern-sidebar{
background:linear-gradient(180deg,#7c3aed,#4f46e5);
padding:50px 30px;
color:white;
}

.modern-main{
padding:50px;
background:white;
}

/* =========================
MINIMAL
========================= */

.minimal-layout{
padding:70px;
background:white;
color:#111827;
}

.minimal-header{
margin-bottom:50px;
}

.minimal-header h1{
font-size:58px;
font-weight:900;
}

.minimal-header h2{
font-size:24px;
color:#666;
margin-top:10px;
}

.minimal-contact{
display:flex;
gap:20px;
flex-wrap:wrap;
margin-top:20px;
font-size:14px;
}

.minimal-section{
margin-bottom:45px;
}

.minimal-section h3{
font-size:14px;
letter-spacing:2px;
margin-bottom:14px;
}

/* =========================
ISLAND
========================= */

.island{
position:fixed;

top:20px;
left:50%;

transform:translateX(-50%);

background:rgba(0,0,0,.75);

padding:14px 24px;

border-radius:999px;

display:flex;
align-items:center;
gap:14px;

backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,.08);

z-index:9999;

opacity:0;
pointer-events:none;

transition:.4s;
}

.island.show{
opacity:1;
top:30px;
}

.loader{
width:18px;
height:18px;

border-radius:50%;

border:2px solid rgba(255,255,255,.2);
border-top:2px solid white;

animation:spin 1s linear infinite;
}

@keyframes spin{
to{
transform:rotate(360deg);
}
}

.progress-wrap{
width:120px;
height:6px;

border-radius:999px;

background:rgba(255,255,255,.08);

overflow:hidden;
}

.progress-bar{
width:0%;
height:100%;

background:
linear-gradient(
90deg,
#06b6d4,
#7c3aed
);

transition:.3s;
}

/* =========================
MOBILE
========================= */

@media(max-width:1000px){

.container{
grid-template-columns:1fr;
}

.sidebar{
border-right:none;
border-bottom:1px solid rgba(255,255,255,.08);
}

.preview{
align-items:flex-start;
overflow:auto;
padding:20px;
}

.cv{
margin-left:20px;
width:794px;
min-height:1123px;
}

.input-grid{
grid-template-columns:1fr;
}

.topbar{
padding:16px;
}

.logo{
font-size:22px;
}

.live-badge{
display:none;
}

.modern-layout{
grid-template-columns:1fr;
}

}

</style>
</head>

<script>

const $ = (id)=>document.getElementById(id)

const cv = $('cv')

const island = $('island')
const islandText = $('islandText')
const progressBar = $('progressBar')

const atsScore = $('atsScore')

const fields = [
'name',
'job',
'email',
'phone',
'location',
'summary',
'experience',
'education',
'skills'
]

const defaults = {

name:'Nama Kamu',

job:'Frontend Developer',

email:'email@gmail.com',

phone:'+62',

location:'Indonesia',

summary:
'Creative frontend developer with strong passion in building premium digital experiences.',

experience:
`Frontend Developer at DTScriptID

• Build modern UI
• Create responsive website
• Optimize performance`,

education:
`SMK Multimedia
2020 - 2023`,

skills:
'HTML,CSS,JavaScript'

}

function getValue(id){
return $(id)?.value?.trim() || ''
}

function updateCV(){
renderTemplate(currentTemplate)
updateATS()
saveData()
}

function renderTemplate(type){

const data = {

name:getValue('name') || defaults.name,

job:getValue('job') || defaults.job,

email:getValue('email') || defaults.email,

phone:getValue('phone') || defaults.phone,

location:getValue('location') || defaults.location,

summary:(getValue('summary') || defaults.summary)
.replace(/\n/g,'<br>'),

experience:(getValue('experience') || defaults.experience)
.replace(/\n/g,'<br>'),

education:(getValue('education') || defaults.education)
.replace(/\n/g,'<br>'),

skills:(getValue('skills') || defaults.skills)
.split(',')
.map(skill=>`<span class="tag">${skill.trim()}</span>`)
.join(''),

avatar:
localStorage.getItem('dtscript_avatar')
|| 'https://i.ibb.co/4pDNDk1/avatar.png'

}

const modernTemplate = `

<div class="modern-layout">

<div class="modern-sidebar">

<img src="${data.avatar}" class="avatar">

<div class="cv-name">
${data.name}
</div>

<div class="cv-role">
${data.job}
</div>

<div class="cv-section">

<div class="cv-title">
CONTACT
</div>

<div class="cv-card">
${data.email}
</div>

<div class="cv-card">
${data.phone}
</div>

<div class="cv-card">
${data.location}
</div>

</div>

<div class="cv-section">

<div class="cv-title">
SKILLS
</div>

<div class="skills">
${data.skills}
</div>

</div>

</div>

<div class="modern-main">

<div class="section">

<div class="section-title">
About Me
</div>

<p>${data.summary}</p>

</div>

<div class="section">

<div class="section-title">
Experience
</div>

<p>${data.experience}</p>

</div>

<div class="section">

<div class="section-title">
Education
</div>

<p>${data.education}</p>

</div>

</div>

</div>

`

cv.className = `cv ${type}`
cv.innerHTML = modernTemplate

cv.querySelectorAll('img').forEach(img=>{
img.crossOrigin = 'anonymous'
})

}

function updateATS(){

let score = 20

if(getValue('name')) score += 10
if(getValue('job')) score += 10
if(getValue('email')) score += 10
if(getValue('phone')) score += 10
if(getValue('location')) score += 5
if(getValue('summary').length > 40) score += 15
if(getValue('experience').length > 40) score += 15
if(getValue('education')) score += 10
if(getValue('skills')) score += 15

if(score > 100){
score = 100
}

atsScore.innerText = score + '%'

}

function autoResize(){

document
.querySelectorAll('textarea')
.forEach(textarea=>{

textarea.style.height='auto'

textarea.style.height =
textarea.scrollHeight+'px'

})

}

fields.forEach(id=>{

$(id).addEventListener('input',()=>{

updateCV()
autoResize()

})

})

$('photoInput')
.addEventListener('change',function(e){

const file = e.target.files[0]

if(!file) return

if(!file.type.startsWith('image/')){
alert('File harus berupa gambar')
return
}

if(file.size > 5 * 1024 * 1024){
alert('Ukuran gambar maksimal 5MB')
return
}

showIsland('Uploading photo...')
setProgress(30)

const reader = new FileReader()

reader.onload = function(event){

localStorage.setItem(
'dtscript_avatar',
event.target.result
)

updateCV()

setProgress(100)

setTimeout(()=>{

hideIsland()
setProgress(0)

},700)

}

reader.readAsDataURL(file)

})

function showIsland(text){

islandText.innerText = text

island.classList.add('show')

}

function hideIsland(){

island.classList.remove('show')

}

function setProgress(percent){

progressBar.style.width =
percent + '%'

islandText.innerText =
`Processing ${percent}%`

}

function wait(ms){

return new Promise(resolve=>{

setTimeout(resolve,ms)

})

}

function saveData(){

const data = {}

fields.forEach(id=>{

data[id] = getValue(id)

})

localStorage.setItem(
'dtscript_cv',
JSON.stringify(data)
)

}

function loadData(){

try{

const data = JSON.parse(
localStorage.getItem('dtscript_cv')
)

if(!data) return

fields.forEach(id=>{

if(data[id] !== undefined){

$(id).value = data[id]

}

})

}catch(err){

console.log(err)

}

}

async function generateAI(){

showIsland('Generating AI CV...')
setProgress(10)

await wait(500)

if(!getValue('summary')){

$('summary').value =
'Creative and detail-oriented professional with expertise in frontend development, premium UI systems, responsive design, animation interface, and modern website architecture.'

}

setProgress(40)

await wait(500)

if(!getValue('experience')){

$('experience').value =
`Frontend Developer
DTScriptID (2024 - Present)

• Build premium website UI
• Create responsive landing page
• Optimize website performance
• Develop animation interaction`

}

setProgress(70)

await wait(500)

if(!getValue('education')){

$('education').value =
`SMK Multimedia
2020 - 2023`

}

if(!getValue('skills')){

$('skills').value =
'HTML,CSS,JavaScript,UI Design,Figma,Tailwind'

}

updateCV()

autoResize()

setProgress(100)

setTimeout(()=>{

hideIsland()
setProgress(0)

},1000)

}

let currentTemplate = 'modern'

function changeTemplate(type){

currentTemplate = type

renderTemplate(type)

applyZoom()

}

let zoomLevel = window.innerWidth < 1000 ? 0.55 : 1

function applyZoom(){

cv.style.transform =
`scale(${zoomLevel})`

if(window.innerWidth < 1000){

cv.style.marginBottom =
`${(1 - zoomLevel) * -1200}px`

cv.style.marginRight =
`${(1 - zoomLevel) * -700}px`

}else{

cv.style.marginBottom = '0'
cv.style.marginRight = '0'

}

}

function zoomIn(){

if(zoomLevel >= 2) return

zoomLevel += 0.1

applyZoom()

}

function zoomOut(){

if(zoomLevel <= 0.3) return

zoomLevel -= 0.1

applyZoom()

}

window.addEventListener('resize',applyZoom)

async function createHighQualityCanvas(){

await document.fonts.ready

const canvas = await html2canvas(cv,{

scale:3,

useCORS:true,
allowTaint:true,

backgroundColor:'#ffffff',

logging:false,

scrollX:0,
scrollY:0,

windowWidth:cv.scrollWidth,
windowHeight:cv.scrollHeight

})

return canvas

}

async function prepareCVExport(){

showIsland('Preparing export...')
setProgress(15)

await wait(300)

const state = {

transform: cv.style.transform,
boxShadow: cv.style.boxShadow,
borderRadius: cv.style.borderRadius,
marginBottom: cv.style.marginBottom,
marginRight: cv.style.marginRight

}

cv.style.transform = 'scale(1)'
cv.style.boxShadow = 'none'
cv.style.borderRadius = '0'
cv.style.marginBottom = '0'
cv.style.marginRight = '0'

document.body.style.overflow = 'hidden'

return state

}

function restoreCVExport(state){

cv.style.transform = state.transform
cv.style.boxShadow = state.boxShadow
cv.style.borderRadius = state.borderRadius
cv.style.marginBottom = state.marginBottom
cv.style.marginRight = state.marginRight

document.body.style.overflow = ''

applyZoom()

}

async function downloadPDF(){

try{

const state = await prepareCVExport()

showIsland('Generating PDF...')
setProgress(35)

const canvas =
await createHighQualityCanvas()

setProgress(70)

const imgData =
canvas.toDataURL('image/jpeg',1)

const pdf = new jspdf.jsPDF({

orientation:'portrait',
unit:'mm',
format:'a4'

})

const pdfWidth = 210

const ratio =
canvas.height / canvas.width

const height =
pdfWidth * ratio

pdf.addImage(
imgData,
'JPEG',
0,
0,
pdfWidth,
height
)

pdf.save(
`${getValue('name') || 'CV'}-Premium.pdf`
)

restoreCVExport(state)

setProgress(100)

setTimeout(()=>{

hideIsland()
setProgress(0)

},1000)

}catch(err){

console.error(err)

alert('PDF gagal dibuat')

hideIsland()

}

}
